{% extends 'base.html' %}

{% block title %}Editar lista{% endblock %}

{% block content %}

<div class="card shadow-sm">
    <div class="card-body">

        <h1 class="mb-4">Editar lista</h1>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Título:</label>
                <input 
                    type="text" 
                    name="title" 
                    value="{{ task_list.title }}" 
                    class="form-control" 
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary">
                Guardar cambios
            </button>

            <a href="{% url 'board_detail' task_list.board.id %}" class="btn btn-secondary">
                Volver
            </a>
        </form>

    </div>
</div>

{% endblock %}
