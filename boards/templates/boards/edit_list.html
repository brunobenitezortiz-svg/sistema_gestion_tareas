<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar lista</title>
</head>
<body>

    <h1>Editar lista</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Título:</label>
        <br>
        <input type="text" name="title" value="{{ task_list.title }}" required>

        <br><br>

        <button type="submit">Guardar cambios</button>
    </form>

    <br>

    <a href="{% url 'board_detail' task_list.board.id %}">Volver</a>

</body>
</html>
