<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar tablero</title>
</head>
<body>

    <h1>Editar tablero</h1>

    <form method="POST">

        {% csrf_token %}

        <label>Título:</label>
        <br>

        <input
            type="text"
            name="title"
            value="{{ board.title }}"
            required
        >

        <br><br>

        <label>Descripción:</label>
        <br>

        <textarea name="description">{{ board.description }}</textarea>

        <br><br>

        <button type="submit">
            Guardar cambios
        </button>

    </form>

</body>
</html>
