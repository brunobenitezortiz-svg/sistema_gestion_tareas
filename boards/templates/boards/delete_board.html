{% extends 'base.html' %}

{% block title %}Eliminar tablero{% endblock %}

{% block content %}

<div class="card shadow-sm border-danger">
    <div class="card-body">

        <h1 class="mb-3 text-danger">Eliminar tablero</h1>

        <p>¿Deseas eliminar el tablero?</p>

        <h5>{{ board.title }}</h5>

        <form method="POST" class="mt-3">
            {% csrf_token %}

            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'home' %}" class="btn btn-secondary">Cancelar</a>
        </form>

    </div>
</div>

{% endblock %}
