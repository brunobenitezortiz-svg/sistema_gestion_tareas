<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear tablero</title>
</head>
<body>
    <h1>Crear tablero</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Título:</label>
        <input type="text" name="title" required>

        <br><br>

        <label>Descripción:</label>
        <textarea name="description"></textarea>

        <br><br>

        <button type="submit">Guardar</button>
    </form>

    <br>

    <a href="{% url 'home' %}">Volver</a>
</body>
</html>
