{% extends 'base.html' %}

{% block title %}Crear lista{% endblock %}

{% block content %}

<div class="card shadow-sm">
    <div class="card-body">

        <h1 class="mb-4">Crear lista</h1>

        <p class="text-muted">Tablero: {{ board.title }}</p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Título de la lista:</label>
                <input type="text" name="title" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{% url 'board_detail' board.id %}" class="btn btn-secondary">Volver</a>
        </form>

    </div>
</div>

{% endblock %}
