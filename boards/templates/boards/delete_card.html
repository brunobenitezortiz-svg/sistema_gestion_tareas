<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar tarjeta</title>
</head>
<body>

    <h1>Eliminar tarjeta</h1>

    <p>¿Estás seguro de que deseas eliminar la tarjeta?</p>

    <strong>{{ card.title }}</strong>

    <form method="POST">
        {% csrf_token %}
        <br><br>
        <button type="submit">Sí, eliminar</button>
    </form>

    <br>

    <a href="{% url 'board_detail' card.task_list.board.id %}">Cancelar</a>

</body>
</html>
