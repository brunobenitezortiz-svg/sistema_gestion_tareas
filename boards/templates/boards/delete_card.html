{% extends 'base.html' %}

{% block title %}Eliminar tarjeta{% endblock %}

{% block content %}

<div class="card shadow-sm border-danger">
    <div class="card-body">

        <h1 class="mb-3 text-danger">Eliminar tarjeta</h1>

        <p>¿Estás seguro de que deseas eliminar esta tarjeta?</p>

        <h5>{{ card.title }}</h5>

        {% if card.description %}
            <p class="text-muted">{{ card.description }}</p>
        {% endif %}

        <form method="POST" class="mt-3">
            {% csrf_token %}

            <button type="submit" class="btn btn-danger">
                Sí, eliminar
            </button>

            <a href="{% url 'board_detail' card.task_list.board.id %}" class="btn btn-secondary">
                Cancelar
            </a>
        </form>

    </div>
</div>

{% endblock %}
