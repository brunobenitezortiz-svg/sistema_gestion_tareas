<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar lista</title>
</head>
<body>

    <h1>Eliminar lista</h1>

    <p>¿Estás seguro de que deseas eliminar esta lista?</p>

    <strong>{{ task_list.title }}</strong>

    <p>También se eliminarán sus tarjetas.</p>

    <form method="POST">
        {% csrf_token %}
        <br>
        <button type="submit">Sí, eliminar</button>
    </form>

    <br>

    <a href="{% url 'board_detail' task_list.board.id %}">Cancelar</a>

</body>
</html>
