<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis tableros</title>
</head>
<body>

    <h1>Bienvenido, {{ request.user.username }}</h1>

    <a href="{% url 'logout' %}">
        Cerrar sesión
    </a>

    <hr>

    <h2>Mis tableros</h2>

    <a href="{% url 'create_board' %}">
        Crear nuevo tablero
    </a>

    <ul>

        {% for board in boards %}

            <li>

                <a href="{% url 'board_detail' board.id %}">
                    <strong>{{ board.title }}</strong>
                </a>

                {% if board.description %}
                    - {{ board.description }}
                {% endif %}

                <br>

                <a href="{% url 'edit_board' board.id %}">
                    Editar
                </a>

                |

                <a href="{% url 'delete_board' board.id %}">
                    Eliminar
                </a>

            </li>

        {% empty %}

            <li>No tienes tableros creados.</li>

        {% endfor %}

    </ul>

</body>
</html>
