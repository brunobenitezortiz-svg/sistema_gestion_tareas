{% extends 'base.html' %}

{% block title %}Editar tarjeta{% endblock %}

{% block content %}

<div class="card shadow-sm">
    <div class="card-body">

        <h1 class="mb-4">Editar tarjeta</h1>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Título</label>

                <input
                    type="text"
                    name="title"
                    value="{{ card.title }}"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Descripción</label>

                <textarea
                    name="description"
                    class="form-control"
                    rows="3"
                >{{ card.description }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Asignar a</label>

                <select name="assigned_to" class="form-select">

                    <option value="">Sin asignar</option>

                    {% for user in users %}
                        <option
                            value="{{ user.id }}"
                            {% if card.assigned_to and card.assigned_to.id == user.id %}
                                selected
                            {% endif %}
                        >
                            {{ user.username }}
                        </option>
                    {% endfor %}

                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Prioridad</label>

                <select name="priority" class="form-select">

                    <option value="alta"
                        {% if card.priority == 'alta' %}
                            selected
                        {% endif %}
                    >
                        Alta
                    </option>

                    <option value="media"
                        {% if card.priority == 'media' %}
                            selected
                        {% endif %}
                    >
                        Media
                    </option>

                    <option value="baja"
                        {% if card.priority == 'baja' %}
                            selected
                        {% endif %}
                    >
                        Baja
                    </option>

                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha límite</label>

                <input
                    type="date"
                    name="due_date"
                    value="{{ card.due_date|date:'Y-m-d' }}"
                    class="form-control"
                >
            </div>

            <button type="submit" class="btn btn-primary">
                Guardar cambios
            </button>

            <a href="{% url 'board_detail' card.task_list.board.id %}"
               class="btn btn-secondary">
                Volver
            </a>

        </form>

    </div>
</div>

{% endblock %}
